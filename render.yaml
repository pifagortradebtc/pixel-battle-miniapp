# Инфраструктура Render (Blueprint). Существующий сервис можно привязать к репозиторию с этим файлом
# или продублировать настройки вручную в Dashboard: Region Frankfurt, Health Check Path /health.
services:
  - type: web
    name: pixel-battle-miniapp
    runtime: node
    region: frankfurt
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    scaling:
      minInstances: 1
      maxInstances: 1
    # За прокси (Render/Cloudflare) без TRUST_PROXY все клиенты выглядят как один IP → 401 на /ws и 429 на bridge.
    envVars:
      - key: TRUST_PROXY
        value: "1"
